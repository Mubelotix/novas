name: CI

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  native:
    name: Native tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Run native parity test
        run: cargo test --test parity_against_c

  wasm:
    name: Wasm tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install wasm-bindgen test runner
        run: cargo install wasm-bindgen-cli --version 0.2.118

      - name: Run wasm parity smoke test
        run: cargo test --target wasm32-unknown-unknown --test wasm_bindgen_smoke

      - name: Run wasm virtual-file I/O test
        run: cargo test --target wasm32-unknown-unknown --test wasm_virtual_file
