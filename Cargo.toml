[package]
name = "novas"
version = "0.1.0"
edition = "2021"
rust-version = "1.74"
license = "MIT OR Apache-2.0"
description = "Rust bindings to USNO NOVAS C3.1 astrometry library"
readme = "README.md"
links = "novas_c31"
build = "build.rs"

[dependencies]

[build-dependencies]
bindgen = "0.72"
cc = "1.1"
reqwest = { version = "0.12", default-features = false, features = ["blocking", "rustls-tls"] }
zip = { version = "2", default-features = false, features = ["deflate"] }
